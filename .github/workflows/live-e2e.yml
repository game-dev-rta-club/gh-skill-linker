name: Live E2E

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: write

concurrency:
  group: live-e2e-${{ github.run_id }}-${{ github.run_attempt }}
  cancel-in-progress: false

jobs:
  owned-branch:
    if: github.repository == 'game-dev-rta-club/gh-skill-linker'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      BRANCH: test/e2e/${{ github.run_id }}/${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Build extension
        run: go build -o "$RUNNER_TEMP/gh-skill-linker" .

      - name: Create owned test branch
        run: |
          test "$GITHUB_REPOSITORY" = "game-dev-rta-club/gh-skill-linker"
          case "$BRANCH" in test/e2e/*) ;; *) exit 1 ;; esac
          if git ls-remote --heads origin "refs/heads/$BRANCH" | grep --quiet .; then
            echo "branch already exists: $BRANCH" >&2
            exit 1
          fi
          git push origin "HEAD:refs/heads/$BRANCH"
          printf '%s\n' "$BRANCH" > "$RUNNER_TEMP/live-branch.txt"

      - name: Exercise status, push, pull, and conflict
        run: |
          project="$RUNNER_TEMP/project"
          remote_work="$RUNNER_TEMP/remote-work"
          binary="$RUNNER_TEMP/gh-skill-linker"

          wait_for_state() {
            expected="$1"
            output="$2"
            for _ in {1..20}; do
              "$binary" status --json > "$output"
              if jq --exit-status --arg expected "$expected" \
                'map(select(.skillName == "e2e")) | length == 1 and .[0].state == $expected' \
                "$output" >/dev/null; then
                jq . "$output"
                return 0
              fi
              sleep 1
            done
            jq . "$output"
            echo "skill state did not become $expected after 20 attempts" >&2
            return 1
          }

          gh auth setup-git
          mkdir -p "$project"
          git -C "$project" init -b main
          git -C "$project" config user.name gh-skill-linker-e2e
          git -C "$project" config user.email gh-skill-linker@users.noreply.github.com
          cd "$project"
          "$binary" install game-dev-rta-club/gh-skill-linker --branch "$BRANCH" \
            | tee "$RUNNER_TEMP/discovered-skills.txt"
          grep --fixed-strings --quiet 'gh-skill-linker' "$RUNNER_TEMP/discovered-skills.txt"
          if grep --fixed-strings --quiet 'e2e' "$RUNNER_TEMP/discovered-skills.txt"; then
            echo "hidden E2E fixture appeared in public discovery" >&2
            exit 1
          fi
          "$binary" install game-dev-rta-club/gh-skill-linker --all --branch "$BRANCH"
          "$binary" install game-dev-rta-club/gh-skill-linker \
            .test-fixtures/skills/e2e --branch "$BRANCH"
          "$binary" install game-dev-rta-club/gh-skill-linker \
            .test-fixtures/skills/e2e-secondary --branch "$BRANCH"
          git add .agents/skills/gh-skill-linker .agents/skills/e2e \
            .agents/skills/e2e-secondary .gh-skill-linker.json
          git commit -m "test: track installed fixture"

          "$binary" status --json | tee "$RUNNER_TEMP/status-clean.json"
          # GitHub App tokens have no user viewerPermission. In that case the
          # push command below proves writability with its dry-run fallback.
          jq --exit-status 'length == 3 and all(.[]; .state == "clean" and (.pushEligibility == "eligible" or (.pushEligibility == "unknown" and .pushReason == "permission_unknown")))' \
            "$RUNNER_TEMP/status-clean.json"

          perl -pi -e 's/^This file is intentionally small.*$/Live push from GitHub Actions./' \
            "$project/.agents/skills/e2e/SKILL.md"
          "$binary" status --json | tee "$RUNNER_TEMP/status-push.json"
          jq --exit-status 'map(select(.skillName == "e2e")) | length == 1 and .[0].state == "push"' \
            "$RUNNER_TEMP/status-push.json"
          "$binary" push e2e
          # GitHub's GraphQL ref can briefly lag behind a successful Git push.
          wait_for_state clean "$RUNNER_TEMP/status-after-push.json"

          git clone --branch "$BRANCH" --single-branch \
            "https://github.com/$GITHUB_REPOSITORY.git" "$remote_work"
          git -C "$remote_work" config user.name gh-skill-linker-e2e
          git -C "$remote_work" config user.email gh-skill-linker@users.noreply.github.com
          perl -pi -e 's/^Live push from GitHub Actions\.$/Remote pull from GitHub Actions./' \
            "$remote_work/.test-fixtures/skills/e2e/SKILL.md"
          git -C "$remote_work" add .test-fixtures/skills/e2e/SKILL.md
          git -C "$remote_work" commit -m "test: create remote pull"
          git -C "$remote_work" push origin "HEAD:refs/heads/$BRANCH"

          wait_for_state pull "$RUNNER_TEMP/status-pull.json"
          "$binary" pull e2e
          wait_for_state clean "$RUNNER_TEMP/status-after-pull.json"

          perl -pi -e 's/^Remote pull from GitHub Actions\.$/Local conflict from GitHub Actions./' \
            "$project/.agents/skills/e2e/SKILL.md"
          git -C "$remote_work" pull --ff-only
          perl -pi -e 's/^Remote pull from GitHub Actions\.$/Remote conflict from GitHub Actions./' \
            "$remote_work/.test-fixtures/skills/e2e/SKILL.md"
          git -C "$remote_work" add .test-fixtures/skills/e2e/SKILL.md
          git -C "$remote_work" commit -m "test: create remote conflict"
          git -C "$remote_work" push origin "HEAD:refs/heads/$BRANCH"

          if "$binary" pull e2e; then
            echo "conflicting pull unexpectedly succeeded" >&2
            exit 1
          fi
          grep --fixed-strings --quiet '<<<<<<< gh-skill-linker:local' \
            "$project/.agents/skills/e2e/SKILL.md"
          "$binary" status --json | tee "$RUNNER_TEMP/status-conflict.json"
          jq --exit-status 'map(select(.skillName == "e2e")) | length == 1 and .[0].state == "conflict"' \
            "$RUNNER_TEMP/status-conflict.json"

      - name: Record branch evidence
        if: always()
        run: |
          printf 'branch=%s\n' "$BRANCH" >> "$GITHUB_STEP_SUMMARY"
          git ls-remote --heads origin "refs/heads/$BRANCH" >> "$GITHUB_STEP_SUMMARY" || true

      - name: Delete owned test branch
        if: always()
        run: |
          case "$BRANCH" in test/e2e/*) ;; *) exit 1 ;; esac
          git push origin --delete "$BRANCH" || true

      - name: Verify cleanup
        if: always()
        run: |
          if git ls-remote --heads origin "refs/heads/$BRANCH" | grep --quiet .; then
            echo "live branch remains after cleanup: $BRANCH" >&2
            exit 1
          fi
