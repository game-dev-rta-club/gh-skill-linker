name: Feature request
description: Propose a new command or synchronization improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is difficult or unsafe today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the observable command behavior and safe failure mode.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What existing Git or GitHub CLI workflows address part of the problem?
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility considerations
      description: Note effects on manifests, branches, tags, Linux, or macOS.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues for a similar request.
          required: true
