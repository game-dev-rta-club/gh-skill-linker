name: Bug report
description: Report reproducible incorrect behavior in gh-linked-skills.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not report security vulnerabilities here. Use the private process in SECURITY.md.
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Extension version
      placeholder: v0.5.0
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command
      placeholder: gh linked-skills status --json
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Include repository state and sanitized output needed to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include `gh --version`, `git --version`, and architecture.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I removed tokens, repository secrets, and personal information.
          required: true
        - label: I searched existing issues for the same problem.
          required: true
